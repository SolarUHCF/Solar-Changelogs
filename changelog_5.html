<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar UHC — Changelog 5 · Map 2</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Oxanium:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c542;
    --orange: #ff8c42;
    --red: #e84545;
    --teal: #00d4c8;
    --blue: #4a9eff;
    --green: #3ddc84;
    --purple: #b06aff;
    --pink: #ff6ab0;
    --bg: #080a0d;
    --panel: #0d1017;
    --panel2: #111620;
    --border: #1a2030;
    --text: #c8d0de;
    --muted: #48566a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px 80px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-color: #1a0a2e;
    background-size: cover;
    background-position: center 30%;
    filter: brightness(0.18) saturate(1.4);
    z-index: 0;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 60% at 20% 50%, rgba(232,69,69,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 70% at 80% 40%, rgba(180,80,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(245,197,66,0.08) 0%, transparent 60%),
      linear-gradient(to bottom, rgba(8,10,13,0) 0%, rgba(8,10,13,0.95) 100%);
    z-index: 1;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px);
    z-index: 1;
  }

  .hero-content { position: relative; z-index: 2; }

  .server-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 5px 14px;
    border: 1px solid rgba(245,197,66,0.25);
    border-radius: 2px;
    background: rgba(245,197,66,0.06);
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease both;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  .hero-title {
    font-family: 'Oxanium', sans-serif;
    font-size: clamp(44px, 8vw, 88px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 16px;
    animation: fadeDown 0.6s ease 0.1s both;
  }

  .hero-title .accent { color: var(--red); text-shadow: 0 0 40px rgba(232,69,69,0.5); }

  .hero-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: fadeDown 0.6s ease 0.2s both;
  }

  /* ── MAIN ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 24px 100px;
    display: flex;
    flex-direction: column;
    gap: 64px;
  }

  /* ── CHANGELOG BLOCK ── */
  .changelog { scroll-margin-top: 60px; }

  .cl-header {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .cl-header::before {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 80px; height: 2px;
    background: var(--red);
  }

  .cl-num {
    font-family: 'Oxanium', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    opacity: 0.12;
    letter-spacing: -0.04em;
    color: #fff;
    user-select: none;
  }

  .cl-title-wrap { flex: 1; }

  .cl-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 4px;
  }

  .cl-name {
    font-family: 'Oxanium', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.01em;
  }

  .cl-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 4px;
  }

  /* ── SECTIONS ── */
  .cl-sections { display: flex; flex-direction: column; gap: 24px; }

  .cl-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .section-icon { font-size: 16px; }

  .entries { padding: 8px 0; }

  .entry {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 9px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 15px;
    font-weight: 500;
    line-height: 1.5;
    transition: background 0.15s;
  }

  .entry:last-child { border-bottom: none; }
  .entry:hover { background: rgba(255,255,255,0.02); }

  .entry-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.05em;
    font-weight: 400;
  }

  .type-rem { background: rgba(232,69,69,0.12); color: var(--red); border: 1px solid rgba(232,69,69,0.25); }

  .entry-text { color: var(--text); }
  .entry-text strong { color: #fff; font-weight: 700; }
  .entry-text .hl-red { color: var(--red); font-weight: 600; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 32px 24px 48px;
    border-top: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .cl-num { font-size: 48px; }
    .cl-name { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="server-tag">
      <span class="live-dot"></span>
      Solar UHC · solaruhcfeu
    </div>
    <h1 class="hero-title"><span class="accent">Changelog</span><br>5</h1>
    <p class="hero-sub">Map 2 &nbsp;·&nbsp; Book Removal</p>
  </div>
</div>

<div class="main">

  <section class="changelog fade-in" id="cl5">
    <div class="cl-header">
      <div class="cl-num">05</div>
      <div class="cl-title-wrap">
        <div class="cl-eyebrow">// Map 2 · Book Removal</div>
        <div class="cl-name">Changelog 5</div>
      </div>
      <div class="cl-count">1 change</div>
    </div>

    <div class="cl-sections">
      <div class="cl-section">
        <div class="section-head" style="color: var(--red);">
          <span class="section-icon">📖</span> Custom Books
        </div>
        <div class="entries">
          <div class="entry">
            <span class="entry-type type-rem">REM</span>
            <span class="entry-text"><span class="hl-red">Risk Book removed</span> — the <strong>⚠️ Risk</strong> book has been taken out of the game</span>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>

<!-- FOOTER -->
<div class="footer">
  Solar UHC &nbsp;·&nbsp; solaruhcfeu &nbsp;·&nbsp; Map 2 &nbsp;·&nbsp; Changelog 5
</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
